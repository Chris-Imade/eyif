<!-- Grant Tier Selection and Forms -->
<style>
.grant-tier-card {
  background: white;
  border-radius: 12px;
  padding: 30px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s;
  border: 2px solid #e0e0e0;
  height: 100%;
}
.grant-tier-card:hover, .grant-tier-card.featured {
  transform: translateY(-5px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  border-color: #ffc000;
}
.tier-badge {
  display: inline-block;
  padding: 5px 15px;
  border-radius: 20px;
  color: white;
  font-size: 12px;
  font-weight: bold;
  margin-bottom: 15px;
}
.tier-amount {
  font-size: 36px;
  font-weight: bold;
  color: #345995;
  margin: 10px 0;
}
.tier-name {
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 15px;
}
.tier-description {
  color: #666;
  font-size: 14px;
  margin-bottom: 20px;
}
.tier-features {
  list-style: none;
  padding: 0;
  margin: 20px 0;
  text-align: left;
}
.tier-features li {
  padding: 8px 0;
  color: #555;
  font-size: 14px;
}
.tier-btn {
  background: #ffc000;
  color: #111;
  border: none;
  padding: 12px 30px;
  border-radius: 5px;
  font-weight: 600;
  cursor: pointer;
  width: 100%;
  transition: all 0.3s;
}
.tier-btn:hover {
  background: #e6ad00;
}
.application-form {
  display: none;
  background: white;
  padding: 40px;
  border-radius: 12px;
  margin-top: 30px;
}
.application-form.active {
  display: block;
}
.form-section {
  margin-bottom: 30px;
}
.form-section h4 {
  color: #345995;
  margin-bottom: 20px;
  font-size: 18px;
  font-weight: 600;
}
.form-group {
  margin-bottom: 20px;
}
.form-group label {
  display: block;
  margin-bottom: 8px;
  font-weight: 500;
  color: #333;
}
.form-group input,
.form-group textarea,
.form-group select {
  width: 100%;
  padding: 12px;
  border: 1px solid #ddd;
  border-radius: 5px;
  font-size: 14px;
}
.form-group textarea {
  min-height: 120px;
  resize: vertical;
}
.submit-btn {
  background: #345995;
  color: white;
  border: none;
  padding: 15px 40px;
  border-radius: 5px;
  font-weight: 600;
  cursor: pointer;
  font-size: 16px;
}
.submit-btn:hover {
  background: #2a4777;
}
.back-btn {
  background: #666;
  color: white;
  border: none;
  padding: 15px 40px;
  border-radius: 5px;
  font-weight: 600;
  cursor: pointer;
  margin-right: 15px;
}
</style>

<script>
function selectTier(tier) {
  document.getElementById('tier-selection').style.display = 'none';
  document.getElementById(tier + '-form').classList.add('active');
}

function goBack() {
  document.querySelectorAll('.application-form').forEach(form => {
    form.classList.remove('active');
  });
  document.getElementById('tier-selection').style.display = 'block';
}
</script>
